<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>친절한 AI 코딩 선생님</title>
    <script src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/lucide@latest"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Pretendard:wght@400;600;700&display=swap');
        body { font-family: 'Pretendard', sans-serif; }
    </style>
</head>
<body>
    <div id="root"></div>

    <script type="text/babel">
        const { useState, useRef, useEffect } = React;
        
        // 사용자가 직접 입력하게 만드는 리스트
        const SKILL_LIST = [
            "변수 (Variable) 만들기", "참/거짓 (True/False) 활용",
            "비교 연산자 (==, !=, >= 등)", "조건문 (if/else)",
            "for 반복문", "while 반복문", "리스트/배열 (List/Array)",
            "in 연산자", "문자열 포매팅 (f-string, format 등)",
            "함수 (Function) 만들기", "클래스 (Class) / 객체지향"
        ];

        function App() {
            // API 키 상태 관리
            const [apiKey, setApiKey] = useState(localStorage.getItem('my_gemini_api_key') || '');
            const [isKeySet, setIsKeySet] = useState(!!localStorage.getItem('my_gemini_api_key'));
            const [keyInput, setKeyInput] = useState('');

            const [chats, setChats] = useState([{
                id: Date.now().toString(),
                title: '새로운 질문',
                messages: [{ id: 'welcome', role: 'model', text: '안녕! 나는 너의 친절한 코딩 선생님이야. 🧑‍🏫\n\n코딩하다가 막히는 부분이 있거나 궁금한 게 있으면 언제든 물어봐!' }]
            }]);
            const [activeChatId, setActiveChatId] = useState(chats[0].id);
            const [inputText, setInputText] = useState('');
            const [isTyping, setIsTyping] = useState(false);
            const [isAssessmentDone, setIsAssessmentDone] = useState(false);
            const [userSkills, setUserSkills] = useState([]);
            const [isSidebarOpen, setIsSidebarOpen] = useState(true);

            const activeChat = chats.find(c => c.id === activeChatId) || chats[0];
            const messagesEndRef = useRef(null);

            useEffect(() => { lucide.createIcons(); }, [isKeySet, isAssessmentDone, isSidebarOpen, chats, isTyping]);
            useEffect(() => { messagesEndRef.current?.scrollIntoView({ behavior: 'smooth' }); }, [activeChat.messages, isTyping]);

            // 1단계: API 키 입력 화면
            if (!isKeySet) {
                return (
                    <div className="flex h-screen items-center justify-center bg-slate-50 p-4">
                        <div className="bg-white p-8 rounded-3xl shadow-xl max-w-md w-full text-center border border-slate-100">
                            <div className="bg-indigo-50 w-16 h-16 rounded-full flex items-center justify-center mx-auto mb-4">
                                <i data-lucide="key" className="text-indigo-600 w-8 h-8"></i>
                            </div>
                            <h1 className="text-2xl font-bold mb-2">🔑 선생님 호출 암호</h1>
                            <p className="text-slate-500 mb-6 text-sm">AI 선생님을 부르려면 API 키가 필요해!<br/>친구가 카톡으로 보내준 긴 암호를 붙여넣어 줘.</p>
                            <input 
                                type="password" 
                                value={keyInput} 
                                onChange={e => setKeyInput(e.target.value)} 
                                className="w-full border border-slate-300 p-3 rounded-xl mb-4 focus:ring-2 focus:ring-indigo-500 outline-none" 
                                placeholder="AIzaSy..." 
                            />
                            <button 
                                onClick={() => {
                                    if(keyInput.trim().startsWith('AIza')) {
                                        localStorage.setItem('my_gemini_api_key', keyInput.trim());
                                        setApiKey(keyInput.trim());
                                        setIsKeySet(true);
                                    } else {
                                        alert('API 키 형식이 올바르지 않은 것 같아! (보통 AIza로 시작해)');
                                    }
                                }} 
                                className="w-full bg-indigo-600 text-white py-3 rounded-xl font-bold shadow-md hover:bg-indigo-700"
                            >
                                확인 및 선생님 만나기
                            </button>
                        </div>
                    </div>
                );
            }

            const sendMessage = async () => {
                if (!inputText.trim()) return;

                const newUserMsg = { id: Date.now().toString(), role: 'user', text: inputText };
                const updatedChats = chats.map(c => c.id === activeChatId ? { ...c, messages: [...c.messages, newUserMsg] } : c);
                
                setChats(updatedChats);
                setInputText('');
                setIsTyping(true);

                const systemPrompt = `당신은 코딩을 처음 배우는 초보자를 위한 아주 친절하고 인내심 많은 코딩 선생님입니다.
현재 학생이 알고 있는 코딩 지식은 다음과 같습니다: [${userSkills.length > 0 ? userSkills.join(', ') : '아는 문법이 거의 없음'}]

다음 규칙을 무조건 지켜주세요:
1. 어려운 전문 용어는 피하고, 일상생활의 비유를 들어 아주 쉽게 설명하세요.
2. 절대 정답이나 완성된 코드를 먼저 알려주지 말고, 스스로 생각하게 힌트를 주세요.
3. 코딩과 관련 없는 질문을 받으면 정중하게 모른다고 거절하세요.
4. 답변이나 힌트를 줄 때는 반드시 '학생이 알고 있는 지식' 내에서만 해결 가능한 코드를 먼저 제시하세요. 비효율적이더라도 학생이 아는 문법만 써야 합니다.
5. 학생이 아는 선에서 설명을 마친 후, 더 효율적인 개념(학생이 모르는 것)이 있다면 반드시 아래 형식으로 질문하세요:
"이 코드도 맞지만, (사용자가 모르는 효율적인 개념)을 활용하는게 더 효율적일 거에요! 혹시 (사용자가 모르는 개념)에 대해서 설명해드릴까요?"`;

                try {
                    const response = await fetch(`https://generativelanguage.googleapis.com/v1beta/models/gemini-2.5-flash:generateContent?key=${apiKey}`, {
                        method: 'POST',
                        headers: { 'Content-Type': 'application/json' },
                        body: JSON.stringify({
                            contents: updatedChats.find(c => c.id === activeChatId).messages.map(m => ({
                                role: m.role,
                                parts: [{ text: m.text }]
                            })),
                            systemInstruction: { parts: [{ text: systemPrompt }] }
                        })
                    });
                    
                    const data = await response.json();

                    if (!response.ok) {
                        const errorMessage = data.error && data.error.message ? data.error.message : "알 수 없는 API 에러입니다.";
                        const errorStatus = data.error && data.error.code ? data.error.code : response.status;
                        throw new Error(`[에러 코드: ${errorStatus}] ${errorMessage}`);
                    }

                    const aiText = data.candidates[0].content.parts[0].text;
                    setChats(prev => prev.map(c => c.id === activeChatId ? { ...c, messages: [...c.messages, { id: Date.now().toString(), role: 'model', text: aiText }] } : c));
                
                } catch (e) {
                    console.error("API 통신 실패:", e);
                    let errorExplanation = `🚨 **문제가 발생했어요!**\n\n상세 원인: \n\`${e.message}\`\n\n`;
                    if (e.message.includes("API_KEY_INVALID") || e.message.includes("API key not valid")) {
                        errorExplanation += "👉 **해결 방법:** API 키가 잘못되었습니다. 사이트를 초기화하고 정확한 키를 다시 입력해주세요.";
                        localStorage.removeItem('my_gemini_api_key'); // 잘못된 키는 삭제
                    } else if (e.message.includes("Failed to fetch")) {
                        errorExplanation += "👉 **해결 방법:** 인터넷 연결이 끊겼거나 브라우저에서 차단되었습니다.";
                    } else {
                        errorExplanation += "👉 **해결 방법:** 잠시 후 다시 시도해주세요.";
                    }
                    setChats(prev => prev.map(c => c.id === activeChatId ? { ...c, messages: [...c.messages, { id: Date.now().toString(), role: 'model', text: errorExplanation }] } : c));
                } finally { 
                    setIsTyping(false); 
                }
            };

            // 2단계: 스킬 체크 화면
            if (!isAssessmentDone) {
                return (
                    <div className="flex h-screen items-center justify-center bg-slate-50 p-4">
                        <div className="bg-white p-8 rounded-3xl shadow-xl max-w-md w-full border border-slate-100 text-center">
                            <h1 className="text-2xl font-bold mb-4">반가워! 코딩 선생님이야 🧑‍🏫</h1>
                            <p className="text-slate-500 mb-6">알고 있는 문법을 체크해주면 눈높이에 맞춰 설명해줄게!</p>
                            <div className="grid grid-cols-1 gap-2 mb-8 max-h-60 overflow-y-auto text-left px-2">
                                {SKILL_LIST.map(skill => (
                                    <label key={skill} className="flex items-center p-3 border rounded-xl cursor-pointer hover:bg-indigo-50">
                                        <input type="checkbox" className="w-5 h-5 accent-indigo-600" onChange={() => {
                                            setUserSkills(prev => prev.includes(skill) ? prev.filter(s => s !== skill) : [...prev, skill]);
                                        }} />
                                        <span className="ml-3 font-medium text-slate-700">{skill}</span>
                                    </label>
                                ))}
                            </div>
                            <button onClick={() => setIsAssessmentDone(true)} className="w-full py-4 bg-indigo-600 text-white rounded-xl font-bold shadow-lg">대화 시작하기</button>
                        </div>
                    </div>
                );
            }

            // 3단계: 채팅 화면
            return (
                <div className="flex h-screen bg-white">
                    <div className={`fixed md:relative z-20 w-72 h-full bg-slate-900 text-white transition-transform ${isSidebarOpen ? 'translate-x-0' : '-translate-x-full'} md:translate-x-0`}>
                        <div className="p-5 font-bold text-xl border-b border-slate-800 flex justify-between items-center">
                            <span>코딩 멘토 AI</span>
                            <button onClick={() => setIsSidebarOpen(false)} className="md:hidden"><i data-lucide="x"></i></button>
                        </div>
                        <div className="p-4 overflow-y-auto h-[calc(100%-120px)]">
                            {chats.map(c => (
                                <div key={c.id} onClick={() => setActiveChatId(c.id)} className={`p-3 mb-2 rounded-lg cursor-pointer ${activeChatId === c.id ? 'bg-indigo-600' : 'hover:bg-slate-800'}`}>
                                    {c.title}
                                </div>
                            ))}
                        </div>
                        
                        {/* ★ 완전 초기화 버튼 부분 수정 ★ */}
                        <div className="p-4 border-t border-slate-800">
                            <button onClick={() => {
                                if(window.confirm("정말 처음부터 다시 시작할까요?\n(입력하신 API 키, 대화 내역, 체크리스트가 모두 지워집니다)")){
                                    // 1. 저장된 API 키 삭제
                                    localStorage.removeItem('my_gemini_api_key');
                                    // 2. 페이지 새로고침 (가장 확실한 초기화 방법)
                                    window.location.reload();
                                }
                            }} className="w-full py-2 bg-slate-800 rounded-lg text-sm flex items-center justify-center gap-2 hover:bg-red-900/50 hover:text-red-400 transition-colors">
                                <i data-lucide="rotate-ccw" className="w-4 h-4"></i> 처음부터 다시 시작
                            </button>
                        </div>
                    </div>

                    <div className="flex-1 flex flex-col min-w-0 relative">
                        <header className="h-16 border-b flex items-center px-4 justify-between bg-white">
                            <button onClick={() => setIsSidebarOpen(true)} className="md:hidden"><i data-lucide="menu"></i></button>
                            <h2 className="font-bold">{activeChat.title}</h2>
                            <div className="w-8"></div>
                        </header>
                        <div className="flex-1 overflow-y-auto p-4 space-y-4">
                            {activeChat.messages.map(m => (
                                <div key={m.id} className={`flex ${m.role === 'user' ? 'justify-end' : 'justify-start'}`}>
                                    <div className={`max-w-[80%] p-4 rounded-2xl ${m.role === 'user' ? 'bg-indigo-600 text-white rounded-tr-none' : (m.text.includes('🚨') ? 'bg-red-50 border border-red-200 text-red-700' : 'bg-slate-100 text-slate-800 rounded-tl-none')}`}>
                                        <pre className="whitespace-pre-wrap font-sans leading-relaxed">{m.text}</pre>
                                    </div>
                                </div>
                            ))}
                            {isTyping && <div className="text-slate-400 text-sm animate-pulse italic flex items-center gap-2"><div className="w-4 h-4 border-2 border-indigo-400 border-t-transparent rounded-full animate-spin"></div>선생님이 생각 중...</div>}
                            <div ref={messagesEndRef} />
                        </div>
                        <footer className="p-4 border-t bg-white">
                            <div className="max-w-4xl mx-auto flex gap-2">
                                <textarea 
                                    className="flex-1 border border-slate-300 rounded-xl p-3 focus:outline-none focus:ring-2 focus:ring-indigo-500 resize-none"
                                    rows="1"
                                    placeholder="질문을 입력하세요... (엔터로 전송)"
                                    value={inputText}
                                    onChange={e => setInputText(e.target.value)}
                                    onKeyDown={e => { if(e.key === 'Enter' && !e.shiftKey) { e.preventDefault(); sendMessage(); } }}
                                />
                                <button onClick={sendMessage} disabled={isTyping} className="bg-indigo-600 text-white px-4 py-3 rounded-xl hover:bg-indigo-700 transition-colors disabled:opacity-50">
                                    <i data-lucide="send"></i>
                                </button>
                            </div>
                        </footer>
                    </div>
                </div>
            );
        }

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>
</html>
